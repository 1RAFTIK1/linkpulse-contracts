name: CI

on:
  push:
    branches: [main]
  pull_request:

# Отменяем устаревшие запуски для той же ветки/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  proto:
    name: proto lint / breaking / codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.71.0

      # Линт схем по STANDARD-набору.
      - name: buf lint
        run: buf lint

      # Форматирование должно быть применено (buf format -w) и закоммичено.
      - name: buf format check
        run: buf format --diff --exit-code

      # Обратная совместимость: сравниваем с main. На самом main шаг пропускаем.
      - name: buf breaking
        if: github.event_name == 'pull_request'
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main"

      # Сгенерированный код не должен расходиться со схемами.
      - name: codegen is up to date
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
          buf generate
          go mod tidy
          git diff --exit-code || (echo "::error::gen/ или go.mod разошлись — запусти 'make generate' и закоммить" && exit 1)

      - name: go build
        run: go build ./...
