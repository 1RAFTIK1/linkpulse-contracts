# buf.yaml — конфигурация buf CLI (schema v2, актуальная для buf 1.3x+).
# buf заменяет ручной protoc: даёт линт схем, проверку обратной совместимости
# и детерминированную кодогенерацию по buf.gen.yaml.
version: v2

# Модуль(и) со схемами. Здесь один — папка proto/.
modules:
  - path: proto

# Линт .proto по стандартному набору правил buf (именование пакетов, файлов,
# полей, сервисов и т.д.). Гоняется в CI: buf lint.
lint:
  use:
    - STANDARD

# Проверка обратной совместимости: buf breaking сравнивает текущие схемы
# с базовой веткой и валит сборку на несовместимых изменениях (удалили поле,
# сменили тип и т.п.) — контракт нельзя сломать незаметно.
breaking:
  use:
    - FILE
